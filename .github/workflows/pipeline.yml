name: Automated Trading Pipeline

on:
  schedule:
    - cron: '0 20 * * 1-5' # Runs at 20:00 every weekday
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas numpy pyarrow requests tqdm plotly joblib yfinance paramiko

      - name: Download ticker list
        run: |
          if [ ! -f "top_5000_us_by_marketcap.csv" ]; then
            curl -L -o top_5000_us_by_marketcap.csv https://github.com/yszanwar/phase2_qrt_challenge/releases/download/signals/top_5000_us_by_marketcap.csv
            
            # Validate the download
            if [ ! -f "top_5000_us_by_marketcap.csv" ] || [ ! -s "top_5000_us_by_marketcap.csv" ]; then
              echo "ERROR: Failed to download top_5000_us_by_marketcap.csv"
              exit 1
            fi
            
            # Verify it's a valid CSV with expected columns
            head -1 "top_5000_us_by_marketcap.csv" | grep -iE 'symbol|ticker' || {
              echo "ERROR: CSV does not contain 'symbol' or 'ticker' column"
              exit 1
            }
          fi

      - name: Download Pricing Data
        run: python yfinance_download.py --input top_5000_us_by_marketcap.csv --output all_prices_5000_tickers.parquet

      - name: Create Universe and Returns
        run: python 1_create_universe_and_returns.py

      - name: Create Features
        run: python 2_create_features.py

      - name: Run Strategy and Generate Targets
        run: python run_strategy.py

      - name: Upload to QSEC
        run: |
          # Use qsec_upload.py as a module or script
          python -c '
          import os
          from pathlib import Path
          from qsec_upload import upload_targets_file, prepare_targets_file, Region
          import pandas as pd
          
          targets_csv_dir = Path("targets")
          # The prepare script will format it according to the QSEC format and emit a new CSV
          targets_df = pd.read_csv(targets_csv_dir / "targets.csv")
          
          group_id = "IND03" # or similar
          region = Region.AMER
          
          # This writes the formatted csv
          formatted_csv_path = prepare_targets_file(targets_df, group_id, region, targets_csv_dir)
          
          # Validate and Upload
          from qsec_upload import validate_targets_file
          errors = validate_targets_file(formatted_csv_path)
          if errors:
              print(errors)
              exit(1)
              
          # Execute upload
          upload_targets_file(
              targets_csv_path=formatted_csv_path,
              region=region,
              sftp_username="q5106",
              private_key_path=Path("ind03_id_rsa"),
              sftp_host="sftp.qrt.cloud",
          )
          '
