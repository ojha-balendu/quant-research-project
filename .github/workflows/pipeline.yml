name: QRT Live Trading Pipeline

on:
  schedule:
    # Runs at 21:00 UTC (2:30 AM IST) Tuesday through Saturday
    # This guarantees the US market is closed and Yahoo Finance data is finalized
    - cron: '0 21 * * 1-6'
  workflow_dispatch: # Allows you to click "Run workflow" manually for testing

jobs:
  trade:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        # Installs all required libraries including paramiko for the SFTP upload
        run: |
          pip install pandas numpy pyarrow paramiko yfinance scipy joblib

      - name: Download Latest Market Data
        run: |
          python yfinance_download.py --input top_5000_us_by_marketcap.csv --output all_prices_5000_tickers.parquet

      - name: Generate Universe & Returns
        run: |
          python 1_create_universe_and_returns.py

      - name: Run WorldQuant Strategy & Generate Targets
        run: |
          python run_strategy.py

      - name: Upload Targets to QSEC SFTP
        env:
          # You must add these exact two names in your GitHub Repository Secrets
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          SFTP_PRIVATE_KEY: ${{ secrets.SFTP_PRIVATE_KEY }}
        run: |
          # Safely write the private key from secrets into a local file for Paramiko
          echo "$SFTP_PRIVATE_KEY" > private_key.pem
          chmod 600 private_key.pem
          python qsec_upload.py
